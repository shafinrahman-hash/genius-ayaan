# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → New Blueprint → select this file.
#
# Default Dockerfile bundles Ollama + Streamlit — set instance RAM high enough for your model
# (e.g. Standard or better). Optional: run Ollama elsewhere and set OLLAMA_BASE_URL to that API.

services:
  - type: web
    name: genius-ayaan
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    envVars:
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: OLLAMA_TEMPERATURE
        value: "0.35"
      - key: OLLAMA_ROUTER_MODELS
        sync: false
      - key: MODEL_CODE
        sync: false
      - key: MODEL_MATH
        sync: false
      - key: MODEL_CREATIVE
        sync: false
      - key: MODEL_REASONING
        sync: false
      - key: MODEL_GENERAL
        sync: false
