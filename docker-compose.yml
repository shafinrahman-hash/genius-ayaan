# Genius Ayaan — Ollama + Streamlit in one container (default).
#
#   docker compose up -d --build
#
# Models:
#   OLLAMA_MODEL=llama3.2
#   OLLAMA_MODELS=llama3.2,qwen2.5-coder:7b
#   OLLAMA_ROUTER_MODELS={"code":"qwen2.5-coder:7b","general":"llama3.2","math":"llama3.2"}
#
# Optional: separate Ollama service → docker-compose.external-ollama.yml

services:
  web:
    build: .
    ports:
      - "8501:8501"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_MODELS: ${OLLAMA_MODELS:-}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.35}
      PORT: "8501"
      OLLAMA_ROUTER_MODELS: ${OLLAMA_ROUTER_MODELS:-}
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
